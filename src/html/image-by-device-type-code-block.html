<img id='responsive-background' src="" alt="4Site Team Background" width="3236" height="2160">

<!-- Script to change image src according to device type -->
<script>
  (function () {
    const baseUrl = 'https://aaf1a18515da0e792f78-c27fdabe952dfc357fe25ebf5c8897ee.ssl.cf5.rackcdn.com/1874/';
    const imgUrls = {
      desktop: baseUrl + '4SiteBackground.png?v=1775651015000',
      mobile: baseUrl + '4site-troupe-mobile.png?v=1776102117000'
    };

    function updateImageSrc() {
      const img = document.getElementById('responsive-background');
      const isMobile = window.innerWidth <= 768;

      img.src = isMobile ? imgUrls.mobile : imgUrls.desktop;
    }

    updateImageSrc();

    let resizeTimeout;
    window.addEventListener('resize', function () {
      clearTimeout(resizeTimeout);
      resizeTimeout = setTimeout(updateImageSrc, 100);
    });
  })();
</script>
